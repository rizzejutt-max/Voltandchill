<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volt & Chill | Expert AC & Electrical</title>
  <style>
    :root { 
      --bg: #000000; 
      --accent: #FFD700; /* Gold/Yellow */
      --card: #1a1a1a; 
      --text: #ffffff;
    }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      text-align: center; 
      margin: 0; 
      padding: 20px; 
    }
    header {
      padding: 30px 0;
      border-bottom: 2px solid var(--accent);
    }
    .brand {
      font-size: 35px;
      font-weight: bold;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .card { 
      background: var(--card); 
      border: 2px solid var(--accent); 
      border-radius: 20px; 
      padding: 40px 20px; 
      max-width: 450px; 
      margin: 50px auto; 
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }
    h3 { color: var(--accent); font-size: 24px; margin-top: 0; }
    p { color: #cccccc; font-size: 18px; }
    .btn { 
      display: block; 
      padding: 18px; 
      margin: 20px 0; 
      border-radius: 12px; 
      text-decoration: none; 
      font-weight: bold; 
      font-size: 18px;
      transition: 0.3s; 
    }
    .wa { 
      background: #25D366; 
      color: white;
    }
    .call { 
      background: var(--accent); 
      color: black; 
    }
    .btn:hover { transform: scale(1.05); opacity: 0.9; }
    footer { 
      margin-top: 60px; 
      font-size: 14px; 
      color: var(--accent); 
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">⚡ Volt & Chill</div>
    <p style="margin-top:10px;">Karachi's Trusted AC & Electrical Experts</p>
  </header>
  
  <div class="card">
    <h3>Professional Services</h3>
    <p>AC Repairing | House Wiring | 24/7 Emergency</p>
    
    <a href="https://wa.me/923118079337?text=Hello%20Volt%20%26%20Chill%2C%20I%20need%20to%20book%20a%20service." class="btn wa">
      💬 Chat on WhatsApp
    </a>
    
    <a href="tel:+923118079337" class="btn call">
      📞 Call Now: 0311-8079337
    </a>
  </div>

  <footer>© 2026 Volt & Chill - Karachi, Pakistan</footer>
</body>
</html>
