    <style>
        :root { --bg: #000000; --accent: #FFD700; --card: #121a31; --text: #ffffff; --3d-glow: #1a2a4a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; perspective: 1000px; overflow-x: hidden;}
        header { padding: 15px 20px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(5px);}

        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1599420186946-7b6fb4e7e76e?q=80&w=1600&auto=format&fit=crop&q=80&w=1000'); background-size: cover; background-position: center; z-index: -1; animation: bgPan 20s infinite linear; opacity: 0.6;}
        .hero h1 { font-size: 55px; color: var(--accent); text-shadow: 2px 2px 15px rgba(255, 215, 0, 0.8); transform: translateZ(50px); margin-bottom: 10px;}
        .hero p { font-size: 20px; color: #aaa; transform: translateZ(30px); margin-bottom: 30px;}
        .icon-track { position: absolute; top: 50%; left: -100px; width: 200%; height: 60px; pointer-events: none; z-index: 1; animation: iconStream 15s infinite linear;}
        .stream-icon { position: absolute; font-size: 40px; color: rgba(255, 215, 0, 0.6); text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);}
        .icon-1 { left: 0%; top: 0px; }
        .icon-2 { left: 25%; top: 20px; }
        .icon-3 { left: 50%; top: -10px; }
        .icon-4 { left: 75%; top: 15px; }
        .btn { display: inline-block; padding: 15px 30px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 16px; transition: 0.3s; width: calc(100% - 60px); text-align: center; transform: translateZ(40px);}
        .wa { background: #25D366; color: white; border: none; }
        .btn:hover { transform: scale(1.08) translateZ(50px); box-shadow: 0 5px 20px rgba(37, 211, 102, 0.5); }
        .booking-btn-main { background: var(--accent); color: black; margin-top: 30px;}
        .booking-btn-main:hover { transform: scale(1.08) translateZ(50px); box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5); }
        @keyframes hero3D { 0% { transform: rotateY(-1deg); } 50% { transform: rotateY(1deg); } 100% { transform: rotateY(-1deg); } }
        @keyframes bgPan { 0% { background-position: center 0%; } 100% { background-position: center 100%; } }
        @keyframes iconStream { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @media (max-width: 600px) { .hero h1 { font-size: 36px; } header { flex-direction: column; text-align: center; } header .nav { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; } }
