<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volt & Chill | Expert AC & Electrical</title>
    <style>
        :root { --bg: #000000; --accent: #FFD700; --card: #121a31; --text: #ffffff; --wa: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; line-height: 1.6; }
        header { padding: 15px 20px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; background: #000; position: sticky; top: 0; z-index: 1000; }
        .brand { font-size: 22px; font-weight: bold; color: var(--accent); }
        .nav-btn { background: var(--accent); color: #000; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; font-size: 14px; }
        .section { padding: 30px 20px; max-width: 900px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid rgba(255, 215, 0, 0.2); margin-bottom: 30px; }
        .btn-wa { background: var(--wa); color: white; padding: 12px; border-radius: 10px; text-decoration: none; display: block; text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <header>
        <div class="brand">⚡ Volt & Chill</div>
        <div>
            <button class="nav-btn" onclick="uploadItem()">Sell Item</button>
            <button class="nav-btn" onclick="googleLogin()">Login</button>
        </div>
    </header>
    <section class="section">
        <div class="card">
            <h2 style="color: var(--accent);">Hamari Mahaarat</h2>
            <p>Assalam-o-Alaikum! Karachi mein 10 saalon ka professional tajurba.</p>
        </div>
        <h2 style="color: var(--accent); text-align: center;">Marketplace</h2>
        <div id="marketplace-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
            <p style="text-align: center; grid-column: 1/-1;">Loading items...</p>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArFRT6wn6bPhCrIiDucbXxojJQ1-BN_3I",
            authDomain: "voltandchill.firebaseapp.com",
            databaseURL: "https://voltandchill-default-rtdb.firebaseio.com",
            projectId: "voltandchill",
            storageBucket: "voltandchill.firebasestorage.app",
            appId: "1:827659533893:web:ec0f08f744bc854692ed2c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => location.reload())
            .catch(() => alert("Login Error: Authorized Domains check karein."));
        }

        function loadItems() {
            db.ref("items").on("value", (snapshot) => {
                const grid = document.getElementById('marketplace-grid');
                grid.innerHTML = "";
                if (!snapshot.exists()) { grid.innerHTML = "<p style='text-align:center;'>Koi item nahi hai.</p>"; return; }
                snapshot.forEach((child) => {
                    const item = child.val();
                    grid.innerHTML += `<div class="card"><h4>${item.title}</h4><p>${item.details}</p><a href="https://wa.me/923118079337" class="btn-wa">WhatsApp</a></div>`;
                });
            });
        }
        function uploadItem() {
            if(!auth.currentUser) { alert("Pehle Login karein!"); return; }
            const title = prompt("Item Name:");
            const details = prompt("Details:");
            if(title) { db.ref("items").push({ title, details }); alert("Item add ho gaya!"); }
        }
        window.onload = loadItems;
    </script>
</body>
</html>
